<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Todo List</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="card">
      <h1>Todo List</h1>

      <form id="formTodo" class="formTodo">
        <div class="input-row">
          <input id="inputTask" type="text" placeholder="Masukan tugas" />
          <input type="date" id="inputDate" value="2026-03-12" />
        </div>
        <div class="btn-row">
          <button type="button" id="btnTambahTodo" class="btnTambahTodo">
            Tambah
          </button>
          <button type="button" id="btnEditTodo" class="btnEditTodo">
            Edit
          </button>
          <button
            type="button"
            id="btnEditStatusTodo"
            class="btnEditStatusTodo"
          >
            Edit Status
          </button>
          <button type="button" id="btnHapusTodo" class="btnHapusTodo">
            Hapus
          </button>
        </div>
      </form>

      <h3>Daftar Tugas</h3>

      <ul id="listTugas" class="listTugas"></ul>

      <p id="emptyMessage" class="empty-msg">
        Belum ada tugas. Silakan tambah tugas baru.
      </p>

      <script src="./script.js"></script>
    </div>
  </body>
</html>
